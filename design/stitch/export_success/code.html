<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Event Added Success - InstaCalendar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f8f9fa",
              "on-primary": "#ffffff",
              "on-surface": "#191c1d",
              "inverse-surface": "#2e3132",
              "on-surface-variant": "#414754",
              "secondary": "#5b5f64",
              "on-tertiary-fixed-variant": "#783100",
              "primary-fixed": "#d8e2ff",
              "inverse-on-surface": "#f0f1f2",
              "on-secondary-fixed": "#181c20",
              "secondary-container": "#dde0e6",
              "on-error-container": "#93000a",
              "on-tertiary-fixed": "#341100",
              "tertiary-fixed": "#ffdbcb",
              "on-error": "#ffffff",
              "surface-container": "#edeeef",
              "on-tertiary-container": "#0e0200",
              "on-secondary": "#ffffff",
              "primary": "#005bbf",
              "background": "#f8f9fa",
              "surface-tint": "#005bc0",
              "primary-fixed-dim": "#adc7ff",
              "surface-container-high": "#e7e8e9",
              "secondary-fixed": "#dfe3e8",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb691",
              "surface-container-low": "#f3f4f5",
              "tertiary": "#9e4300",
              "error": "#ba1a1a",
              "secondary-fixed-dim": "#c3c7cc",
              "outline-variant": "#c1c6d6",
              "surface-dim": "#d9dadb",
              "on-primary-fixed": "#001a41",
              "on-primary-fixed-variant": "#004493",
              "primary-container": "#1a73e8",
              "on-primary-container": "#ffffff",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "tertiary-container": "#c55500",
              "on-background": "#191c1d",
              "surface-variant": "#e1e3e4",
              "outline": "#727785",
              "surface": "#f8f9fa",
              "on-secondary-container": "#5f6368",
              "surface-container-highest": "#e1e3e4",
              "on-secondary-fixed-variant": "#43474c",
              "inverse-primary": "#adc7ff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed antialiased">
<!-- TopAppBar Shell (Suppressed title as requested, showing just leading back button) -->
<header class="w-full top-0 sticky bg-slate-50 z-50 transition-colors duration-200">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-2xl mx-auto">
<button class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-slate-200/50 transition-colors duration-200 text-slate-500">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-700">sync_alt</span>
<span class="font-manrope font-bold text-lg tracking-tight text-blue-700">Event Sync</span>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="min-h-[calc(100vh-160px)] flex flex-col items-center justify-center px-6 pb-24">
<!-- Celebration Content Area -->
<div class="w-full max-w-md mx-auto space-y-12 text-center">
<!-- Success Icon Section -->
<div class="relative inline-flex items-center justify-center">
<!-- Ambient Glow behind icon -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl scale-150"></div>
<div class="relative w-32 h-32 bg-white rounded-full shadow-[0_4px_24px_rgba(0,91,191,0.08)] flex items-center justify-center">
<div class="w-24 h-24 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</div>
</div>
<!-- Typography & Messaging -->
<div class="space-y-4">
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-on-surface">Event Added!</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-xs mx-auto">
                    Successfully added <span class="font-semibold text-primary">Marketing Sync</span> to your <span class="font-semibold">Google Calendar</span>.
                </p>
</div>
<!-- Calendar Context Card (Bento-style snippet) -->
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.04)] text-left space-y-4">
<div class="flex items-center gap-3">
<div class="w-2 h-10 bg-primary rounded-full"></div>
<div>
<p class="font-headline font-bold text-on-surface">Marketing Sync</p>
<p class="text-sm text-on-surface-variant">Tomorrow, 10:00 AM - 11:30 AM</p>
</div>
</div>
<div class="flex items-center gap-2 text-primary bg-primary-fixed/30 px-3 py-2 rounded-lg w-fit">
<span class="material-symbols-outlined text-sm">notifications_active</span>
<span class="text-xs font-semibold uppercase tracking-wider">Reminder set 15m before</span>
</div>
</div>
<!-- CTA Actions -->
<div class="space-y-4 pt-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-white font-semibold rounded-xl shadow-[0_4px_12px_rgba(0,91,191,0.2)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">calendar_today</span>
                    Open Calendar
                </button>
<button class="w-full py-4 bg-surface-container-high text-on-surface font-semibold rounded-xl hover:bg-surface-dim active:scale-[0.98] transition-all">
                    Back to Home
                </button>
</div>
</div>
<!-- Success Toast (Subtle Insight) -->
<div class="mt-12 glass-effect bg-white/80 border border-white/50 px-6 py-3 rounded-full flex items-center gap-3 shadow-[0_8px_32px_rgba(0,0,0,0.05)]">
<span class="material-symbols-outlined text-tertiary">celebration</span>
<span class="text-sm font-medium text-on-surface-variant">Sync completed in 1.2 seconds</span>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-2 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0_-4px_24px_rgba(0,0,0,0.06)] border-t border-slate-100">
<!-- Home (Active Choice for Success redirection context) -->
<a class="flex flex-col items-center justify-center text-blue-700 bg-blue-50 rounded-xl px-6 py-2 transition-all duration-150 ease-out active:scale-95" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-inter text-[10px] font-semibold tracking-wide uppercase mt-1">Home</span>
</a>
<!-- Recent -->
<a class="flex flex-col items-center justify-center text-slate-400 px-6 py-2 hover:text-blue-600 transition-all duration-150 ease-out active:scale-95" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-inter text-[10px] font-semibold tracking-wide uppercase mt-1">Recent</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-slate-400 px-6 py-2 hover:text-blue-600 transition-all duration-150 ease-out active:scale-95" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-inter text-[10px] font-semibold tracking-wide uppercase mt-1">Settings</span>
</a>
</nav>
</body></html>
